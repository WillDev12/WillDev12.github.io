<!DOCTYPE html>
<html>
    <head>
        <title>[redirect]</title>
        <link rel="icon" type="image/x-icon" href="https://avatars.githubusercontent.com/u/93289932?v=4">
        <script>
            function runAnimation() {
                setTimeout(function() {
                    window.location.href = "https://github.com/WillDev12";
                }, 3800);
            }
        </script>
        <style>
            #myVideo {
                position: fixed;
                right: 0;
                bottom: 0;
                min-width: 100%;
                min-height: 100%;
            }
        </style>
    </head>

    <body onload="runAnimation()">
        <video autoplay muted id="myVideo">
            <source src="redirect.mp4" type="video/mp4">
        </video>
    </body>
</html>
